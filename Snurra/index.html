<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snurran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- PORTRAIT WARNING (visas bara på touch-enheter i stående läge) -->
<div id="portrait-warning" class="portrait-warning hidden">
  <div class="portrait-warning-inner">
    <div class="portrait-icon">↻</div>
    <h2>Vrid din iPad!</h2>
    <p>Snurran fungerar bäst i liggande läge</p>
  </div>
</div>

<!-- ══════════════════════════════════════
     SETUP OVERLAY
══════════════════════════════════════ -->
<div id="overlay-setup" class="overlay active">
  <div class="overlay-card">

    <div class="overlay-header">
      <span class="overlay-icon">🎡</span>
      <h1>Snurran</h1>
      <p class="subtitle">Klassrumsverktyg</p>
    </div>

    <div class="mode-toggle">
      <button id="btn-mode-spin"   class="mode-btn active" onclick="setAppMode('spin')">
        <span class="mode-icon">🎡</span>
        <span class="mode-label">Snurra</span>
        <span class="mode-desc">Dra slumpmässigt</span>
      </button>
      <button id="btn-mode-groups" class="mode-btn"        onclick="setAppMode('groups')">
        <span class="mode-icon">👥</span>
        <span class="mode-label">Grupper</span>
        <span class="mode-desc">Dela in klassen</span>
      </button>
    </div>

    <div class="input-mode-row">
      <button id="btn-input-numbers" class="tag-btn active" onclick="setInputMode('numbers')">🔢 Siffror</button>
      <button id="btn-input-names"   class="tag-btn"        onclick="setInputMode('names')">✏️ Namn</button>
    </div>

    <div id="setup-numbers" class="setup-section">
      <label class="field-label">Antal deltagare</label>
      <div class="number-input-row">
        <button class="num-btn" onclick="adjustCount(-1)">−</button>
        <input type="number" id="input-count" value="28" min="2" max="60" oninput="updateCountPreview()" />
        <button class="num-btn" onclick="adjustCount(1)">+</button>
      </div>
      <p class="hint">Siffrorna 1–<span id="count-preview">28</span> används</p>
    </div>

    <div id="setup-names" class="setup-section hidden">
      <label class="field-label">Namn <span class="hint-inline">(ett per rad)</span></label>
      <textarea id="input-names" rows="7" placeholder="Anna&#10;Björn&#10;Cecilia&#10;..." oninput="updateNameCount()"></textarea>
      <p class="hint"><span id="name-count">0</span> namn inmatade</p>
    </div>

    <div id="setup-groups-extra" class="setup-section hidden">
      <label class="field-label">Antal grupper</label>
      <div class="number-input-row">
        <button class="num-btn" onclick="adjustGroups(-1)">−</button>
        <input type="number" id="input-groups" value="4" min="2" max="12" oninput="updateGroupsHint()" />
        <button class="num-btn" onclick="adjustGroups(1)">+</button>
      </div>
      <p class="hint" id="groups-size-hint"></p>
    </div>

    <div id="setup-spin-extra" class="settings-section">
      <label class="toggle-row">
        <span>Ta bort dragna automatiskt</span>
        <div class="toggle-switch">
          <input type="checkbox" id="chk-remove" />
          <span class="slider"></span>
        </div>
      </label>
    </div>

    <button class="btn-primary" onclick="startApp()">Starta →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SPIN DONE OVERLAY
══════════════════════════════════════ -->
<div id="overlay-result" class="overlay">
  <div class="result-card">
    <div id="result-value"></div>
    <div id="result-label"></div>
    <button class="btn-primary" onclick="closeResult()">Fortsätt</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     SPIN PAGE
══════════════════════════════════════ -->
<div id="page-spin" class="page hidden">

  <header class="game-header">
    <div class="header-left">
      <!-- HOME LINK PLACEHOLDER -->
      <a href="../" class="home-link" title="Gå till startsidan">🏠</a>
      <span class="divider">|</span>
      <span class="game-title">🎡 Snurran</span>
      <span id="remaining-badge" class="badge"></span>
    </div>
    <div class="header-right">
      <!-- Settings panel trigger -->
      <button class="icon-btn" onclick="toggleSettingsPanel()" title="Inställningar" id="btn-settings">⚙️</button>
      <button class="icon-btn" id="btn-sound" onclick="toggleSound()" title="Ljud">🔊</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Tema">🌙</button>
      <button class="icon-btn" onclick="toggleFullscreen()" title="Fullskärm">⛶</button>
      <button class="icon-btn restart-btn" onclick="restartApp()" title="Börja om">↩</button>
    </div>
  </header>

  <!-- Settings panel (slides down) -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-panel-inner">
      <label class="toggle-row compact">
        <span>Ta bort dragna</span>
        <div class="toggle-switch">
          <input type="checkbox" id="chk-remove-live" onchange="toggleRemove()" />
          <span class="slider"></span>
        </div>
      </label>
      <button class="btn-secondary sm" onclick="openGroupsFromSpin()">👥 Gruppindelning</button>
      <button class="btn-secondary sm" onclick="newRound()">🔄 Ny omgång</button>
    </div>
  </div>

  <!-- Two-column layout -->
  <div class="spin-layout">

    <!-- LEFT: Wheel fills this -->
    <main class="spin-main">
      <div class="wheel-wrap">
        <div class="wheel-pointer">▼</div>
        <canvas id="wheel-canvas"></canvas>
      </div>
      <div class="result-display" id="inline-result"></div>
      <button class="btn-spin" id="btn-spin" onclick="spin()">Snurra!</button>
    </main>

    <!-- RIGHT: Drawn panel always visible -->
    <aside class="drawn-aside">
      <div class="drawn-aside-header">
        <span class="drawn-aside-title">Redan dragna</span>
        <button class="btn-secondary sm" onclick="newRound()">🔄 Ny omgång</button>
      </div>
      <div id="drawn-list" class="drawn-aside-list"></div>
      <div class="drawn-aside-footer" id="drawn-count-label"></div>
    </aside>

  </div>

</div>

<!-- ══════════════════════════════════════
     GROUPS PAGE
══════════════════════════════════════ -->
<div id="page-groups" class="page hidden">

  <header class="game-header">
    <div class="header-left">
      <a href="/" class="home-link" title="Gå till startsidan">🏠</a>
      <span class="divider">|</span>
      <span class="game-title">👥 Gruppindelning</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="theme-btn-g" onclick="toggleTheme()" title="Tema">🌙</button>
      <button class="icon-btn" onclick="toggleFullscreen()" title="Fullskärm">⛶</button>
      <button class="icon-btn restart-btn" onclick="restartApp()" title="Börja om">↩</button>
    </div>
  </header>

  <!-- Controls bar -->
  <div class="groups-controls-bar" id="groups-controls-bar">
    <div class="groups-controls-left">
      <span class="pool-label" id="groups-participant-count"></span>
    </div>
    <div class="groups-controls-right">
      <span class="pool-label">Grupper:</span>
      <button class="num-btn sm" onclick="adjustGroupsLive(-1)">−</button>
      <span id="groups-count-display" class="groups-count-num">4</span>
      <button class="num-btn sm" onclick="adjustGroupsLive(1)">+</button>
      <span class="pool-label" id="groups-per-hint"></span>
      <button class="btn-spin-sm" id="btn-divide" onclick="startDivideAnimation()">Dela in!</button>
      <button class="btn-secondary sm hidden" id="btn-reset-groups" onclick="resetGroupsToPool()">↩ Ny indelning</button>
    </div>
  </div>

  <!-- Animation stage — full remaining height -->
  <div id="groups-stage" class="groups-stage">
    <!-- Pool layer: chips here before animation -->
    <div id="pool-layer" class="pool-layer"></div>
    <!-- Columns layer: target columns, chips fly here -->
    <div id="columns-layer" class="columns-layer hidden"></div>
  </div>

</div>

<canvas id="confetti-canvas"></canvas>
<script src="game.js"></script>
</body>
</html>
