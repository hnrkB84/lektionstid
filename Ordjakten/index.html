<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kodknäckaren 🔐</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ENTRY OVERLAY -->
  <div id="entryOverlay" class="entry-overlay">
    <div class="entry-box">
      <div class="entry-title">🔐 Kodknäckaren</div>
      <div class="entry-subtitle">Ange ett ord — klassen ser det inte!</div>
      <div class="entry-section">
        <div class="entry-section-label">Slumpa från kategori</div>
        <div class="cat-btns">
          <button class="cat-btn" data-cat="djur">🦁 Djur</button>
          <button class="cat-btn" data-cat="lander">🌍 Länder</button>
          <button class="cat-btn" data-cat="mat">🍕 Mat</button>
          <button class="cat-btn" data-cat="skolord">📚 Skolord</button>
        </div>
      </div>
      <div class="entry-or">— eller skriv eget ord —</div>
      <div class="entry-input-wrap">
        <input id="wordInput" class="word-input" type="password"
               placeholder="Skriv ordet här…" autocomplete="off" spellcheck="false"/>
        <button id="toggleShow" class="toggle-show">👁</button>
      </div>
      <div id="entryHint" class="entry-hint"></div>
      <div class="entry-section">
        <div class="entry-section-label">Max missar</div>
        <div class="cat-btns" id="missBtns">
          <button class="cat-btn" data-miss="6">6</button>
          <button class="cat-btn active" data-miss="8">8</button>
          <button class="cat-btn" data-miss="10">10</button>
        </div>
      </div>
      <button id="startGameBtn" class="start-game-btn" disabled>▶ Starta spelet</button>
    </div>
  </div>

  <!-- SPELET -->
  <div id="gameScreen" class="game-screen hidden">

    <header class="app-header">
      <h1 class="app-title">🔐 Kodknäckaren</h1>
      <div class="header-right">
        <div id="missCounter" class="miss-counter-header">
          <span id="missText">0 / 8 fel</span>
          <div id="missDots" class="miss-dots"></div>
        </div>
        <button id="btnSound">🔊</button>
        <button id="btnDark">🌙</button>
        <button id="btnFs">⛶</button>
        <button id="btnNewWord" class="btn-new">🔄 Nytt ord</button>
      </div>
    </header>

    <div class="game-grid">

      <!-- ÖVRE VÄNSTER: Ord -->
      <div class="zone-word panel" id="wordPanel">
        <div id="categoryBadge" class="category-badge hidden"></div>
        <div id="letterSlots" class="letter-slots"></div>
      </div>

      <!-- NEDRE VÄNSTER: Alfabet -->
      <div class="zone-alpha panel" id="alphaPanel">
        <div id="alphaGrid" class="alpha-grid"></div>
      </div>

      <!-- HÖGER: Robot — SVG-lager i rätt ordning: bakgrund → huvud → ögon/mun ovanpå -->
      <div class="zone-robot panel" id="robotPanel">
        <div class="robot-label" id="robotLabel">Rädda roboten! 🤖</div>
        <div class="robot-stage">
          <svg id="robotSvg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">

            <!-- Ben och fötter (ritas först = längst bak) -->
            <g id="rp10" class="robot-part"><!-- höger fot -->
              <rect x="114" y="272" width="42" height="13" rx="7" class="r-foot"/>
            </g>
            <g id="rp9" class="robot-part"><!-- höger ben -->
              <rect x="114" y="228" width="30" height="50" rx="9" class="r-body"/>
            </g>
            <g id="rp8" class="robot-part"><!-- vänster ben + fot -->
              <rect x="56" y="228" width="30" height="50" rx="9" class="r-body"/>
              <rect x="44" y="272" width="42" height="13" rx="7" class="r-foot"/>
            </g>

            <!-- Armar (bakom kropp) -->
            <g id="rp7" class="robot-part"><!-- höger arm -->
              <rect x="140" y="146" width="46" height="22" rx="11" class="r-body"/>
              <circle cx="188" cy="157" r="12" class="r-hand"/>
            </g>
            <g id="rp6" class="robot-part"><!-- vänster arm -->
              <rect x="14" y="146" width="46" height="22" rx="11" class="r-body"/>
              <circle cx="12" cy="157" r="12" class="r-hand"/>
            </g>

            <!-- Kropp (inkl nacke) -->
            <g id="rp5" class="robot-part">
              <rect x="56" y="134" width="88" height="100" rx="15" class="r-body"/>
              <rect x="70" y="152" width="60" height="38" rx="9" class="r-panel"/>
              <circle cx="84"  cy="165" r="7"   class="r-led-g"/>
              <circle cx="100" cy="172" r="5"   class="r-led-y"/>
              <circle cx="116" cy="165" r="7"   class="r-led-r"/>
              <rect x="84" y="120" width="32" height="20" rx="7" class="r-neck"/>
            </g>

            <!-- Huvud (utan ögon/mun — de ritas separat ovanpå) -->
            <g id="rp1" class="robot-part">
              <rect x="93" y="36" width="14" height="22" rx="6" class="r-body"/><!-- antennstam -->
              <rect x="58" y="52" width="84" height="76" rx="20" class="r-head"/>
            </g>

            <!-- Antenn-boll ovanpå huvud -->
            <g id="rp2" class="robot-part">
              <circle cx="100" cy="30" r="14" class="r-ant"/>
              <circle cx="100" cy="30" r="6"  class="r-ant-i"/>
            </g>

            <!-- ÖGON — ritas EFTER huvud så de syns ovanpå -->
            <g id="rp3" class="robot-part">
              <!-- Vänster öga -->
              <ellipse cx="82" cy="87" rx="14" ry="15" fill="#ffffff"/>
              <circle  cx="82" cy="87" r="10" fill="#d97706"/>
              <circle  cx="82" cy="87" r="6"  fill="#1e293b"/>
              <circle  cx="86" cy="83" r="2.5" fill="#ffffff"/>
              <circle  cx="79" cy="90" r="1.2" fill="#ffffff" opacity=".6"/>
              <!-- Höger öga -->
              <ellipse cx="118" cy="87" rx="14" ry="15" fill="#ffffff"/>
              <circle  cx="118" cy="87" r="10" fill="#d97706"/>
              <circle  cx="118" cy="87" r="6"  fill="#1e293b"/>
              <circle  cx="122" cy="83" r="2.5" fill="#ffffff"/>
              <circle  cx="115" cy="90" r="1.2" fill="#ffffff" opacity=".6"/>
            </g>

            <!-- Mun glad — även den ovanpå huvud -->
            <g id="rp4" class="robot-part">
              <rect x="80" y="112" width="40" height="10" rx="5" class="r-mouth"/>
            </g>

            <!-- Mun ledsen -->
            <g id="rpSad" class="robot-part hidden">
              <path d="M 80 122 Q 100 110 120 122" stroke-width="6" fill="none"
                    class="r-mouth-sad" stroke-linecap="round"/>
            </g>

          </svg>
        </div>
      </div>

    </div>
  </div>

  <div id="resultOverlay" class="result-overlay hidden">
    <div class="result-box">
      <div id="resultEmoji" class="result-emoji"></div>
      <div id="resultTitle" class="result-title"></div>
      <div id="resultWord"  class="result-word"></div>
      <button id="btnPlayAgain" class="play-again-btn">🔄 Nytt ord</button>
    </div>
  </div>

  <canvas id="confettiCanvas" class="confetti-canvas"></canvas>
  <script src="game.js"></script>
</body>
</html>
